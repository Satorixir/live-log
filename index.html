<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resonance Log</title>
    <link rel="stylesheet" href="styles.css?v=20260628-music-log">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="#records" aria-label="Resonance Log トップ">
          <span class="brand-mark">R</span>
          <span>Resonance Log</span>
        </a>
        <nav class="primary-nav" aria-label="主要メニュー">
          <a href="#records">ライブ</a>
          <a href="#artists">アーティスト</a>
          <a href="#listening">Spotify</a>
        </nav>
      </div>
    </header>

    <section class="app-header">
      <div class="header-copy">
        <p class="eyebrow">Personal music archive</p>
        <h1>Resonance Log</h1>
        <p class="header-description">ライブの予定と参加履歴、Spotifyの視聴履歴をまとめた音楽ログ。</p>
      </div>
      <div class="summary-strip" aria-label="サマリー">
        <div>
          <span id="totalCount">-</span>
          <small>ライブ記録</small>
        </div>
        <div>
          <span id="spotifyPlayCount">-</span>
          <small>Spotify再生</small>
        </div>
        <div>
          <span id="spotifyHourCount">-</span>
          <small>再生時間</small>
        </div>
        <div>
          <span id="yearRange">-</span>
          <small>記録期間</small>
        </div>
      </div>
    </section>

    <main>
      <section class="toolbar" aria-label="検索とフィルタ">
        <label class="search-field">
          <span>公演を検索</span>
          <input id="searchInput" type="search" placeholder="アーティスト名、会場名、メモから検索">
        </label>
        <label>
          <span>年</span>
          <select id="yearFilter">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>アーティスト</span>
          <select id="artistFilter">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>会場</span>
          <select id="venueFilter">
            <option value="">すべて</option>
          </select>
        </label>
        <button id="resetButton" type="button">リセット</button>
      </section>

      <section id="records" class="content-grid">
        <div class="table-panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Live archive</p>
              <h2>ライブ記録</h2>
            </div>
            <p id="resultCount">-</p>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>開演日</th>
                  <th>アーティスト</th>
                  <th>会場</th>
                  <th>チケット</th>
                  <th>備考</th>
                </tr>
              </thead>
              <tbody id="liveRows"></tbody>
            </table>
          </div>
        </div>

        <aside class="side-panel" aria-label="音楽統計">
          <section id="artists" class="artist-detail-panel">
            <div class="side-heading">
              <h2 id="artistDetailTitle">アーティスト</h2>
              <button id="clearArtistButton" class="ghost-button" type="button">解除</button>
            </div>
            <div id="artistDetail" class="artist-detail"></div>
          </section>
          <section id="listening">
            <p class="section-kicker">Spotify history</p>
            <h2>よく聴くアーティスト</h2>
            <ol id="topSpotifyArtists" class="ranking"></ol>
          </section>
          <section>
            <p class="section-kicker">Favorite tracks</p>
            <h2>よく聴く曲</h2>
            <ol id="topSpotifyTracks" class="ranking track-ranking"></ol>
          </section>
          <section>
            <p class="section-kicker">Live stats</p>
            <h2>よく観るアーティスト</h2>
            <ol id="topArtists" class="ranking"></ol>
          </section>
        </aside>
      </section>
    </main>

    <script src="data/lives.js?v=20260614"></script>
    <script src="data/artist_profiles.js?v=20260614"></script>
    <script src="data/spotify_artist_stats.js?v=20260614"></script>
    <script src="app.js?v=20260628-music-log"></script>
  </body>
</html>
